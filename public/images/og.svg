<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Open Graph / social share image — 1200x630 (Facebook, LinkedIn, WhatsApp, iMessage standard) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1ece4"/>
      <stop offset="100%" stop-color="#fbf8f3"/>
    </linearGradient>
    <radialGradient id="glow1" cx="78%" cy="22%" r="50%">
      <stop offset="0%" stop-color="#cfb589" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#cfb589" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="85%" r="55%">
      <stop offset="0%" stop-color="#87966a" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#87966a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Two radial glows for depth -->
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative concentric circles (anatomy / movement motif) -->
  <g opacity="0.08" stroke="#5a6b3a" fill="none" transform="translate(960, 130)">
    <circle r="140" stroke-width="0.6"/>
    <circle r="180" stroke-width="0.4"/>
    <circle r="220" stroke-width="0.3"/>
    <line x1="-220" y1="0" x2="220" y2="0" stroke-width="0.4"/>
    <line x1="0" y1="-220" x2="0" y2="220" stroke-width="0.4"/>
  </g>

  <!-- Top-left eyebrow -->
  <text x="80" y="100" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#5a6b3a" letter-spacing="3">
    CABINET D'OSTÉOPATHIE • AVIGNON
  </text>

  <!-- Main name -->
  <text x="80" y="240" font-family="Cormorant Garamond, Georgia, serif" font-weight="500" font-size="92" fill="#3f4d28" filter="url(#soft)">
    Matthieu Yeghiazarian,
  </text>
  <text x="80" y="335" font-family="Cormorant Garamond, Georgia, serif" font-weight="500" font-size="92" fill="#3f4d28" filter="url(#soft)">
    Ostéopathe D.O.
  </text>

  <!-- Tagline -->
  <text x="80" y="395" font-family="Cormorant Garamond, Georgia, serif" font-style="italic" font-size="32" fill="#5a6b3a" opacity="0.85">
    Mouvement <tspan fill="#cfb589">•</tspan> Précision <tspan fill="#cfb589">•</tspan> Performance
  </text>

  <!-- Bottom row: address + Doctolib pill -->
  <g transform="translate(80, 530)">
    <!-- Address -->
    <circle cx="14" cy="0" r="7" fill="none" stroke="#5a6b3a" stroke-width="1.5"/>
    <circle cx="14" cy="-2.5" r="2" fill="#5a6b3a"/>
    <text x="35" y="6" font-family="Inter, system-ui, sans-serif" font-size="22" fill="#2b2b25">
      38 Avenue Saint-Ruf, 84000 Avignon
    </text>
  </g>

  <!-- Doctolib pill, bottom-right -->
  <g transform="translate(875, 510)">
    <rect x="0" y="0" rx="40" ry="40" width="245" height="60" fill="#5a6b3a"/>
    <text x="122" y="38" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#fbf8f3">
      Prendre RDV en ligne
    </text>
  </g>

  <!-- Bottom-left domain -->
  <text x="80" y="603" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#5a6b3a" opacity="0.6" letter-spacing="2">
    OSTEOPATHEAVIGNON.COM
  </text>
</svg>
